spring.application.name=auth-service

server.port=8086

# Database Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/AuthServiceDB
spring.datasource.username=postgres
spring.datasource.password=Anadi@1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=YourSecretKeyHereMustBeLongEnoughForHS512AlgorithmAtLeast64Characters123456
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ========================================
# Resilience4j Circuit Breaker Configuration
# ========================================
# Circuit Breaker for Microservice Sync
resilience4j.circuitbreaker.instances.microserviceSync.register-health-indicator=true
resilience4j.circuitbreaker.instances.microserviceSync.sliding-window-size=10
resilience4j.circuitbreaker.instances.microserviceSync.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.microserviceSync.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.microserviceSync.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.microserviceSync.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.microserviceSync.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.microserviceSync.slow-call-rate-threshold=100
resilience4j.circuitbreaker.instances.microserviceSync.slow-call-duration-threshold=2s

# ========================================
# Resilience4j Retry Configuration
# ========================================
resilience4j.retry.instances.microserviceSync.max-attempts=3
resilience4j.retry.instances.microserviceSync.wait-duration=1s
resilience4j.retry.instances.microserviceSync.enable-exponential-backoff=true
resilience4j.retry.instances.microserviceSync.exponential-backoff-multiplier=2

# ========================================
# Logging Configuration
# ========================================
logging.level.root=INFO
logging.level.com.microservice_demo.auth_service=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.feign=DEBUG

# Log Pattern with Emojis for Better Readability
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log File Configuration
logging.file.name=logs/auth-service.log
logging.file.max-size=10MB
logging.file.max-history=30

# ========================================
# Actuator Configuration
# ========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
management.metrics.export.prometheus.enabled=true

# ========================================
# Feign Client Configuration
# ========================================
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000
feign.client.config.default.logger-level=full
feign.circuitbreaker.enabled=true

# Specific configuration for Demo Services
feign.client.config.demo-service1.connect-timeout=3000
feign.client.config.demo-service1.read-timeout=5000
feign.client.config.demo-service1.logger-level=full

feign.client.config.demo-service2.connect-timeout=3000
feign.client.config.demo-service2.read-timeout=5000
feign.client.config.demo-service2.logger-level=full

# ========================================
# Enable Feign Request/Response Compression
# ========================================
feign.compression.request.enabled=true
feign.compression.request.mime-types=text/xml,application/xml,application/json
feign.compression.request.min-request-size=2048
feign.compression.response.enabled=true

# ========================================
# HikariCP Connection Pool
# ========================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000